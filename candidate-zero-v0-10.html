<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDIDATE ZERO — A Hot Texas Primary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
:root{
  --walnut:#1a130d; --walnut-2:#241a11; --parchment:#e9dcc0; --parchment-dim:#cfc0a0;
  --oxblood:#8a2f26; --oxblood-bright:#b13c2f; --gold:#b08d3e; --gold-dim:#7d6530;
  --ink:#221a10; --sage:#6b7a5e; --disaster:#5e1410;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--walnut)}
body{font-family:'EB Garamond',Georgia,serif;color:var(--parchment);min-height:100vh;font-size:17px;line-height:1.45;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(176,141,62,.06),transparent 60%),var(--walnut);}
.wrap{max-width:1040px;margin:0 auto;padding:24px 14px 90px}
.masthead{border-top:3px double var(--gold);border-bottom:3px double var(--gold);padding:18px 8px 14px;text-align:center;position:relative}
.masthead::before,.masthead::after{content:"◆";color:var(--gold-dim);position:absolute;top:50%;transform:translateY(-50%);font-size:12px}
.masthead::before{left:10px}.masthead::after{right:10px}
h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(24px,5vw,40px);letter-spacing:.14em}
.masthead .sub{font-family:'Cinzel',serif;font-weight:500;font-size:11px;letter-spacing:.32em;color:var(--gold);margin-top:6px;text-transform:uppercase}
.epigraph{text-align:center;font-style:italic;color:var(--parchment-dim);padding:14px 18px 2px;font-size:18px}
.epigraph b{color:var(--oxblood-bright);font-style:normal}
.phasebar{text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-top:8px}
.stickybar{position:sticky;top:0;z-index:30;background:var(--walnut);padding:6px 0 4px;border-bottom:1px solid #3a2c1b}
.ledger{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:1px;background:var(--gold-dim);border:1px solid var(--gold-dim);scrollbar-width:thin}
.weekrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px}
.weekrow .ap{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase}
.tabs{display:flex;gap:4px;margin:10px 0 8px;overflow-x:auto}
.tab{flex:1;font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;background:transparent;
 color:var(--parchment-dim);border:1px solid #3a2c1b;padding:9px 6px;cursor:pointer;white-space:nowrap;min-height:40px}
.tab.active{color:var(--gold);border-color:var(--gold-dim);background:var(--walnut-2)}
.tabpane{display:none}.tabpane.active{display:block}
.cell{flex:0 0 auto;background:var(--walnut-2);padding:6px 9px;min-width:72px;text-align:center}
.cell .k{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;display:block}
.cell .v{font-family:'Courier Prime',monospace;font-size:18px}
.cell .v small{font-size:11px;color:var(--parchment-dim)}
.slab{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);text-align:center;margin:22px 0 9px;position:relative}
.slab::before,.slab::after{content:"";position:absolute;top:50%;width:18%;border-top:1px solid var(--gold-dim)}
.slab::before{left:0}.slab::after{right:0}
/* grounds board */
.grounds{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.ground{background:var(--walnut-2);border:1px solid #3a2c1b;padding:9px 11px;font-size:14px}
.ground .gn{font-family:'Cinzel',serif;font-size:12.5px;letter-spacing:.06em;display:flex;justify-content:space-between}
.ground .gn .aff{color:var(--gold-dim);font-size:10px;letter-spacing:.14em}
.ground .stat{display:flex;justify-content:space-between;color:var(--parchment-dim);font-family:'Courier Prime',monospace;font-size:12px;margin-top:3px}
.ground .rbar{height:5px;background:#0e0a06;border:1px solid #3a2c1b;margin-top:5px;position:relative}
.ground .rbar i{position:absolute;left:0;top:0;bottom:0;background:var(--gold);opacity:.85}
.ground .gotv{color:var(--sage);font-family:'Courier Prime',monospace;font-size:11px;margin-top:3px}
.ground.gated{opacity:.55}
/* rows of small chips: allies, holdings, rivals */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:var(--walnut-2);border:1px solid #3a2c1b;padding:6px 10px;font-size:13.5px}
.chip .cn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em}
.chip .cs{font-family:'Courier Prime',monospace;font-size:11px;color:var(--parchment-dim);display:block}
.chip.warm3{border-color:var(--gold)} .chip.warm1{border-color:#5a4326;opacity:.8} .chip.warm0{opacity:.45;border-style:dashed}
.chip.obl{border-color:var(--oxblood);color:#e0b3aa}
.chip.rep{border-color:var(--sage);color:#c6d0b9}
.chip.rival .cs{color:var(--oxblood-bright)}
/* faces */
.tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px}
.track{background:var(--walnut-2);border:1px solid #3a2c1b;padding:7px 10px}
.track .names{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.08em}
.track .names .virt{color:var(--parchment)} .track .names .shad{color:var(--oxblood-bright)}
.track .bar{height:5px;background:#0e0a06;margin-top:5px;position:relative;border:1px solid #3a2c1b}
.track .bar .pip{position:absolute;top:-3px;width:9px;height:9px;background:var(--gold);transform:translateX(-50%);border:1px solid #000}
/* hand */
.hand{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:10px}
.card{background:linear-gradient(175deg,#efe3c6,#e2d2ae);color:var(--ink);border:1px solid #9a824f;outline:1px solid #9a824f;outline-offset:3px;
  padding:11px 12px 10px;position:relative;cursor:pointer;transition:transform .1s ease;text-align:left;width:100%;font:inherit}
.card:hover:not(:disabled),.card:focus-visible{transform:translateY(-2px)}
.card:focus-visible{box-shadow:0 0 0 3px var(--gold)}
.card:disabled{opacity:.35;cursor:not-allowed}
.card h3{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.04em;margin-bottom:3px;padding-right:54px}
.card .cost{position:absolute;top:9px;right:10px;font-family:'Courier Prime',monospace;font-size:11px;color:var(--oxblood);text-align:right}
.card p{font-size:13.5px;line-height:1.3;color:#4a3b24}
.card .odds{margin-top:6px;font-family:'Courier Prime',monospace;font-size:12px;color:#6a5426;border-top:1px dashed #9a824f;padding-top:5px}
.card .tag{display:inline-block;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;margin-top:5px}
.card .tag.SAFE{color:#2e5c33}.card .tag.STD{color:#6a5426}.card .tag.VOL{color:var(--oxblood)}
/* log */
.log{background:#100c07;border:1px solid #3a2c1b;padding:12px 14px;max-height:300px;overflow-y:auto;font-size:15.5px}
.log p{margin-bottom:8px;border-left:2px solid #3a2c1b;padding-left:9px}
.log p.week{border-left-color:var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
.log p.chance{border-left-color:var(--sage);color:#b9c4ab;font-style:italic}
.log p.dire{border-left-color:var(--oxblood-bright);color:#e0a79d}
.log p.shadow{border-left-color:#6d2a52;color:#d8a8c8;font-style:italic}
.log p.rep{border-left-color:#8ea27f;color:#c6d0b9}
/* overlays */
.overlay{position:fixed;inset:0;background:rgba(10,7,4,.87);display:flex;align-items:center;justify-content:center;z-index:50;padding:14px;overflow-y:auto}
.reveal{background:linear-gradient(175deg,#efe3c6,#e0cfa9);color:var(--ink);border:1px solid #9a824f;outline:1px solid #9a824f;outline-offset:4px;
  max-width:470px;width:100%;padding:22px 22px;text-align:center}
.reveal h3{font-family:'Cinzel',serif;letter-spacing:.07em;font-size:16px}
.reveal .oddsline{font-family:'Courier Prime',monospace;font-size:12px;color:#6a5426;margin:7px 0 12px}
.stamp{display:inline-block;font-family:'Cinzel',serif;font-weight:900;font-size:27px;letter-spacing:.11em;padding:7px 18px;border:3px double currentColor;transform:rotate(-4deg);margin:5px 0 10px}
@media (prefers-reduced-motion:no-preference){.stamp{animation:slam .26s cubic-bezier(.2,2.4,.4,1) both}@keyframes slam{from{transform:rotate(-4deg) scale(2.3);opacity:0}to{transform:rotate(-4deg) scale(1);opacity:1}}}
.stamp.t0{color:#1e5c33}.stamp.t1{color:#41601f}.stamp.t2{color:var(--oxblood)}.stamp.t3{color:var(--disaster)}
.reveal .detail{font-size:15px;color:#3c3018}
.reveal .pickrow{display:grid;gap:8px;grid-template-columns:1fr 1fr;margin-top:10px}
.btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;background:var(--oxblood);color:var(--parchment);
  border:1px solid #5e1f18;padding:10px 22px;cursor:pointer}
.btn:hover,.btn:focus-visible{background:var(--oxblood-bright)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn.ghost{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
.btn.ghost:hover{border-color:var(--gold)}
.btn.sm{padding:7px 12px;font-size:10.5px;letter-spacing:.1em}
.endweek{display:flex;justify-content:center;gap:10px;margin:18px 0 4px}
.panel{background:var(--walnut-2);border:1px solid #3a2c1b;padding:20px 18px;margin-top:14px}
.panel h2{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.13em;color:var(--gold);margin-bottom:9px;text-transform:uppercase}
.choices{display:grid;gap:9px;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));margin-top:9px}
.doors{display:grid;gap:9px;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));margin-top:12px}
.door{border:1px dashed var(--gold-dim);padding:13px;color:var(--parchment-dim);text-align:center}
.door .dn{font-family:'Cinzel',serif;color:var(--parchment);letter-spacing:.07em;font-size:13px}
.door .stub{font-family:'Courier Prime',monospace;font-size:10.5px;color:var(--gold-dim);letter-spacing:.12em;display:block;margin-top:5px}
.door.open{border-style:solid;border-color:var(--gold);color:var(--parchment)}
.small{font-size:13.5px;color:var(--parchment-dim)}
.hidden{display:none}
footer{text-align:center;margin-top:40px;color:#5d4c30;font-size:12px;font-family:'Courier Prime',monospace;letter-spacing:.05em}
.digest{max-height:60vh;overflow-y:auto;text-align:left;font-size:15px}
.digest p{margin-bottom:8px;border-left:2px solid #9a824f;padding-left:9px;color:#3c3018}
.digest p.rvl{border-left-color:var(--oxblood);color:#5e2a22}
.digest p.evt{border-left-color:#4a5c3e;color:#3d4a33;font-style:italic}
.chron{border:1px dashed var(--gold-dim);padding:10px 12px;margin-bottom:12px;font-size:14.5px;color:var(--parchment-dim)}
.chron .ct{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.26em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:6px}
.chron p{margin-bottom:5px}
.chron p b{color:var(--parchment)}
.traitpick{display:grid;gap:8px;grid-template-columns:1fr;margin-top:10px}
@media(max-width:640px){
 body{font-size:15px}
 .wrap{padding:14px 8px 70px}
 .cell{min-width:58px;padding:5px 5px}
 .cell .v{font-size:14px}.cell .k{font-size:8px;letter-spacing:.1em}
 .hand{grid-template-columns:repeat(3,1fr);gap:6px}
 .card{padding:11px 9px 10px;outline-offset:2px;min-height:44px}
 .card h3{font-size:11.5px;padding-right:40px}.card p{font-size:11px}
 .card .cost{font-size:9.5px;top:7px;right:7px}.card .odds{font-size:10px}
 .grounds{grid-template-columns:1fr 1fr;gap:6px}
 .ground{font-size:12px;padding:7px 8px}
 .tracks{grid-template-columns:1fr 1fr}
 .btn{padding:13px 18px;font-size:11px;min-height:44px}
 .choices{grid-template-columns:1fr 1fr}
 h1{letter-spacing:.08em}
 .log{font-size:13.5px;max-height:240px}
}

/* ---- dopamine juice ---- */
@keyframes floatUp{0%{opacity:0;transform:translateY(6px) scale(.8)}15%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-38px) scale(1)}}
.floater{position:fixed;z-index:60;pointer-events:none;font-family:'Cinzel',serif;font-weight:700;font-size:20px;text-shadow:0 2px 4px #000;animation:floatUp 1.1s ease-out forwards}
.floater.good{color:#5fd08a}.floater.big{color:#ffd45e;font-size:26px}.floater.bad{color:#e0776b}.floater.xp{color:#8ab4ff}
@keyframes stampPunch{0%{transform:rotate(-4deg) scale(2.6);opacity:0}40%{opacity:1}55%{transform:rotate(-4deg) scale(.9)}70%{transform:rotate(-4deg) scale(1.06)}100%{transform:rotate(-4deg) scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.reveal.breakthrough{box-shadow:0 0 0 2px #ffd45e, 0 0 40px rgba(255,212,94,.5)}
.reveal.breakthrough::before{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,212,94,.25) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 1.1s ease-out;pointer-events:none}
.xpwrap{display:flex;align-items:center;gap:8px;margin-top:5px}
.xpbar{flex:1;height:8px;background:#0e0a06;border:1px solid #3a2c1b;position:relative;overflow:hidden}
.xpbar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#5a7fb0,#8ab4ff);transition:width .5s cubic-bezier(.2,1.4,.4,1)}
.xplabel{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;color:#8ab4ff;white-space:nowrap}
.lvlbadge{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--gold);background:var(--walnut-2);border:1px solid var(--gold-dim);padding:2px 7px}
.toast{position:fixed;left:50%;top:14%;transform:translateX(-50%);z-index:70;background:linear-gradient(175deg,#efe3c6,#e0cfa9);color:var(--ink);border:1px solid var(--gold);outline:2px solid var(--gold);outline-offset:2px;padding:12px 20px;text-align:center;max-width:90%;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:floatUp .4s ease-out both, fadeToast .4s ease-in 2.6s forwards}
.toast h4{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.08em;margin-bottom:2px}
.toast p{font-size:13px;color:#4a3b24}
@keyframes fadeToast{to{opacity:0;transform:translateX(-50%) translateY(-14px)}}
.streakpip{display:inline-block;color:#ffd45e;font-size:11px}

/* ---- polish pass ---- */
.stamp.t0{color:#8a6d1e;border-color:#8a6d1e;text-shadow:0 0 12px rgba(255,212,94,.4)}
.stamp.t1{color:#2e5c33;border-color:#2e5c33}
.stamp.t2{color:#8a6d2f;border-color:#8a6d2f}
.stamp.t3{color:var(--oxblood-bright);border-color:var(--oxblood-bright)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
.reveal.disaster{animation:shake .45s ease-in-out;box-shadow:0 0 0 2px var(--oxblood-bright),0 0 34px rgba(177,60,47,.45)}
.enight{max-width:460px;text-align:center}
.enight .precinct{font-family:'Courier Prime',monospace;font-size:13px;color:var(--parchment-dim);letter-spacing:.06em}
.enight .bignum{font-family:'Cinzel',serif;font-size:44px;letter-spacing:.04em;color:var(--gold);margin:6px 0;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.enight .vs{font-size:13px;color:var(--parchment-dim)}
.ebar{height:14px;background:#0e0a06;border:1px solid #3a2c1b;position:relative;overflow:hidden;margin:10px 0 4px}
.ebar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#6a8f5e,#9ec27f);transition:width 1.2s cubic-bezier(.3,1,.4,1)}
.ebar .mark{position:absolute;left:50%;top:-3px;bottom:-3px;width:2px;background:var(--gold);opacity:.85}
.log p{border-left:3px solid transparent;padding-left:8px}
.log p.week{border-left-color:var(--gold-dim)}
.log p.dire{border-left-color:var(--oxblood)}
.log p.rep{border-left-color:#2e5c33}
.log p.shadow{border-left-color:#4a3b5e}
.tab.active{border-bottom:2px solid var(--gold)}
.btn:active{transform:translateY(1px)}
.card.mini:not(:disabled):active{transform:scale(.97)}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.55}}
.urgent{color:var(--oxblood-bright);animation:pulseRed 1.4s infinite}

/* ---- aesthetic pass ---- */
.sub{letter-spacing:.34em}
.card.mini{transition:transform .12s ease,box-shadow .12s ease;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.card.mini:not(:disabled):hover{transform:translateY(-3px);box-shadow:0 8px 18px rgba(0,0,0,.5)}
.card.mini:disabled{filter:grayscale(.5) brightness(.75)}
.card.mini h3{font-size:12.5px}
.card.mini .modds{font-weight:700}
.ground{background:linear-gradient(178deg,var(--walnut-2),#241a10);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.rbar{height:9px;box-shadow:inset 0 1px 3px rgba(0,0,0,.6)}
.rbar i{background:linear-gradient(90deg,#5d7a52,#8fae74);box-shadow:0 0 8px rgba(143,174,116,.35)}
.chip{box-shadow:0 1px 4px rgba(0,0,0,.3);border-radius:1px}
.chip.obl{background:linear-gradient(175deg,#2a1d1a,#231512);border-color:#5e2a22}
.chip.rival{background:linear-gradient(175deg,#241a20,#1c1218)}
.cell b{font-size:15px}
.cell{border-bottom:2px solid transparent;transition:border-color .3s}
.reveal{box-shadow:0 14px 50px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.35)}
.stamp{letter-spacing:.22em}
.slab{background:linear-gradient(90deg,transparent,rgba(154,130,79,.12) 20%,rgba(154,130,79,.12) 80%,transparent)}
.digest p.dire{color:#d8968c}
.digest p.evt{color:#cbb87f}
.toast{border-radius:2px}
#epigraph{border-left:2px solid var(--gold-dim);padding-left:12px}

/* ---- standing actions (basic moves, per SRD practice) ---- */
.standing{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.plaque{flex:1 1 30%;min-width:104px;min-height:44px;background:linear-gradient(178deg,#2e2418,#241a10);
 border:1px solid var(--gold-dim);border-left:4px solid #2e5c33;color:var(--parchment);
 font-family:'EB Garamond',serif;text-align:left;padding:8px 10px;cursor:pointer;transition:transform .1s}
.plaque:not(:disabled):hover{transform:translateY(-2px)}
.plaque:disabled{filter:grayscale(.6) brightness(.7)}
.plaque .pn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;color:var(--gold)}
.plaque .pd{font-family:'Courier Prime',monospace;font-size:10px;color:var(--parchment-dim);margin-top:2px}
.plaque.pipe{border-left-color:#8a6d2f}
input.nameinput{font-family:'EB Garamond',serif;font-size:18px;background:#100c07;border:1px solid var(--gold-dim);color:var(--parchment);padding:12px;width:100%;max-width:340px;-webkit-appearance:none;appearance:none;border-radius:0;box-shadow:none}
input.nameinput::placeholder{color:#6a5a40}
input.nameinput:focus{outline:2px solid var(--gold);outline-offset:1px}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>CANDIDATE ZERO</h1>
    <div class="sub">A Hot Texas Primary</div>
    <div style="display:flex;justify-content:center;gap:8px;margin-top:10px">
      <button class="btn ghost sm" id="mapBtn">How to play</button>
      <button class="btn ghost sm" id="legendBtn">Ledger?</button>
    </div>
  </div>
  <p class="epigraph" id="epigraph"></p>
  <div class="phasebar" id="phasebar"></div>
  <div style="text-align:center;font-size:13px;color:var(--parchment-dim);margin-bottom:8px"><span id="personaDisp"></span> · <span id="districtDisp"></span> · <span id="issueDisp"></span></div>

  <div id="setup" class="panel"><h2>Filing Papers</h2><div id="chronicle"></div><div id="setupSteps"></div></div>

  <div id="game" class="hidden">
    <div class="stickybar">
      <div class="ledger" id="ledger"></div>
      <div class="weekrow">
        <span class="ap" id="apLabel"></span>
        <div class="xpwrap"><span class="lvlbadge" id="lvlBadge">Lv 1</span><div class="xpbar"><i id="xpFill" style="width:0%"></i></div><span class="xplabel" id="xpLabel">0/5</span></div>
        <span>
          <button class="btn ghost sm" id="redrawBtn" title="Scrap the week's plan and draw a fresh hand (once per week)">New plan</button>
          <button class="btn sm" id="endWeekBtn">End week →</button>

/* ---------- resolution engine ---------- */
function resolve(p,risk){
 p=clamp(p,0.02,0.95);
 const critShare= risk==='VOL'?0.3: risk==='SAFE'? (hasRep(S,'R01')?0.15:0) :0.18;
 let band= risk==='SAFE'?0 : (0.04+S.tier*0.04)*(risk==='VOL'?2:1);
 band=Math.max(0,band+(S.globalBand||0)-(warm(S,'AL11')?0.02:0)-(hasRep(S,'R10')?0.01:0));
 const roll=Math.random();let tier;
 if(critShare>0&&roll<p*critShare)tier=0;else if(roll<p)tier=1;else if(band>0&&roll>1-band)tier=3;else tier=2;
 return{tier,roll,p,band};
}

/* ---------- ground picker ---------- */
function pickGround(allow,cb){
 const root=$('overlayRoot');
 const opts=grounds(S).slice().sort((a,b)=>b.pool-a.pool).map(g=>{
  const locked=g.gated;
  return `<button class="btn ghost sm" data-g="${g.id}" ${locked?'disabled title="Gated — the Corridor opens through the Congregation or the Pastor"':''}>${g.n}${locked?' 🔒':''}<br><span style="font-size:10px">${g.pool} doors · rapport ${g.rapport|0}${g.gotv>0?' · GOTV +'+Math.round(g.gotv*100)+'%':''}</span></button>`;}).join('');
 root.innerHTML=`<div class="overlay"><div class="reveal"><h3>Where?</h3><div class="pickrow">${opts}</div>
  <button class="btn sm" style="margin-top:12px" id="cancelPick">Never mind</button></div></div>`;
 root.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{root.innerHTML='';cb(ground(S,b.dataset.g));});
 $('cancelPick').onclick=()=>{root.innerHTML='';};
}
function rapGain(g,amt){ if(S.rapStall) amt=Math.ceil(amt/2); g.rapport=clamp(g.rapport+amt,0,100); }

const ASSETS={
 A01:{n:'The Walk List',cost:400,req:s=>s.assets.includes('A02'),d:'Walks +50%, targeted doors.'},
 A02:{n:'Voter File Access',cost:400,d:'Enables the Walk List and absentee targeting.'},
 A03:{n:'Mail Program',cost:1500,d:'Unlocks Contrast Mail; Subdivisions convert ×2.'},
 A04:{n:'Website That Works',cost:300,d:'Small-dollar list compounds.'},
 A06:{n:'The Flatbed Truck',cost:800,d:'Rides to the Polls; FM Roads events double.'},
 A09:{n:'Phone Tree',cost:0,vcost:2,d:'Phone Bank doubles; college kids flake-proofed.'},
 A11:{n:'Push Cards',cost:250,d:'Every walk adds +1 name ID.'},
 A12:{n:'Billboard on the Highway',cost:2000,d:'Passive name ID, Phase II–III.'},
};
function assetPlays(){return Object.entries(ASSETS).filter(([id,a])=>!S.assets.includes(id)&&(!a.req||a.req(S))).map(([id,a])=>({
 id:'BUY'+id,n:'Acquire: '+a.n,cost:{a:0,$:a.cost,v:a.vcost||0},risk:'SAFE',ph:[1,2,3],tag:'asset',d:a.d,odds:()=>1,
 run(){S.assets.push(id);return a.n+' acquired. '+a.d;}}));}

/* ---------- rivals ---------- */
const RIVALNAMES=['Dale Hutto','Earlene Voss','J.T. Pruitt','Marisol Vega','Bo Kessler','Rev. C.L. Marsh'];
function mkRivals(n,incumbent){const out=[];const pool=[...RIVALNAMES];
 if(incumbent){const nm='Rep. '+pool.splice(Math.floor(R(pool.length)),1)[0];out.push({n:nm,strength:34+R(8),grow:.8,alive:true,incumbent:true,endorse:3});n=Math.max(0,n-1);}
 for(let i=0;i<n;i++){const nm=pool.splice(Math.floor(R(pool.length)),1)[0];
 out.push({n:nm,strength:15+R(9),grow:.6+R(.8),alive:true,endorse:0});}return out}
function rivalActs(){const lines=[];
 S.rivals.forEach(r=>{if(!r.alive)return;
  const roll=Math.random();
  if(S.stage==='general'){r.strength+=r.grow;return;}
  if(roll<.35){r.strength+=r.grow*1.4;lines.push({t:r.n+' walks the '+pick(grounds(S)).n+' all week. Their numbers firm up.',c:'rvl'});}
  else if(roll<.55&&S.tier>=1){const shielded=hasRep(S,'R02')||warm(S,'AL06');if(!shielded)S.hitPieces++;
   lines.push({t:r.n+' drops a mailer about you.'+(shielded?' It slides off — reputation is armor.':' It lands.'),c:'rvl'});}
  else if(roll<.72){const wa=S.allies.filter(a=>a.warm>0&&a.warm<3&&a.warm>-9)[0];
   if(wa){wa.age+=2;lines.push({t:r.n+' is seen on '+ALLIES[wa.id].n+'\u2019s porch. Your call is overdue.',c:'rvl'});}
   else{r.endorse=(r.endorse||0)+1;r.strength+=r.grow*.5;lines.push({t:r.n+' picks up a precinct chair\u2019s nod. The endorsement race moves.',c:'rvl'});}}
  else if(roll<.85){const g=pick(grounds(S));g.rapport=Math.max(0,g.rapport-2);
   lines.push({t:r.n+' holds a rally at '+g.n+'. Your rapport there takes a dent.',c:'rvl'});}
  else{r.strength+=r.grow*(S.tier===2?1.6:1);lines.push({t:r.n+' banks quiet money. Strength rises.',c:'rvl'});}
 });
 return lines;}

function showDigest(lines){
 const root=$('overlayRoot');

 const hl=dire||evt;
 const hlHtml=hl?'<div style="font-family:Cinzel,serif;font-size:14px;letter-spacing:.05em;color:'+(dire?'var(--oxblood-bright)':'var(--gold)')+';border-bottom:1px solid var(--gold-dim);padding-bottom:6px;margin-bottom:8px">'+hl.t.split('.')[0].toUpperCase().slice(0,90)+'</div>':'';
 root.innerHTML=`<div class="overlay"><div class="reveal" style="text-align:left"><h3 style="text-align:center">The Week Turns</h3>${hlHtml}
 <div class="digest">${lines.map(l=>`<p class="${l.c||''}">${l.t}</p>`).join('')}</div>
 <button class="btn" id="dOk" style="margin-top:12px;display:block;margin-left:auto;margin-right:auto">On to the work</button></div></div>`;

function sessionEnd(){
 S.over=true;
 if(S.bill.stage===7){
  const veto=Math.random()<(0.22+(S.favor<40?.12:0));
  if(veto){log('THE GOVERNOR\u2019S DESK — VETOED. A statement citing "unintended consequences" that reads like it was written before your bill was.','dire');}
  else{S.bill.stage=8;log('THE GOVERNOR\u2019S DESK — SIGNED. A pen you will frame. Law, with your name inside it.','rep');}
 }
 const passed=S.bill.stage>=8, nearMiss=S.bill.stage>=6;
 let text='SINE DIE. The gavel falls. ';
 if(passed)text+='<b>Your bill is law.</b> A freshman author with a signed bill — the building will remember your name next session.';
 else if(nearMiss)text+='Your bill died '+(S.bill.stage===7?'awaiting a signature':'between the chambers')+' — agonizingly close. Half the building considers that a rookie triumph anyway.';
 else if(S.bill.stage>=4)text+='Your bill died in the calendar crush with hundreds of better-connected corpses. No shame in the pile, no law either.';
 else text+='Your bill never truly left the ground. The first session teaches; it rarely gives.';
 const standing=S.districtStanding+(passed?15:nearMiss?8:0)+Math.min(10,S.capital);
 const reelect=clamp(standing*.62+(Math.random()-.5)*26,5,95);
 text+=`<br><br>THE INTERIM VERDICT — district standing ${Math.round(S.districtStanding)}, capital ${S.capital}, the Speaker\u2019s favor ${Math.round(S.favor)}. Reelection outlook rolls at <b>${reelect.toFixed(0)}%</b>… `;
 if(reelect>50){text+='<b>and holds.</b> The seat is yours again.';terminal('sessionWin',reelect,text);}
 else{text+='<b>and breaks.</b> A primary challenger — younger, angrier, funded — takes the seat you bled for.';terminal('lose',reelect,text);}
}

/* ---------- weekly card acquisition: the deck grows every week ---------- */
function weeklyCardOffer(){
 if(S.stage==='session')return; // session grows via capital/writs, not the campaign deck
 const owned=new Set([...(S.deck||[]),'PL01','PL04','PL05']);
 const pool=PLAYS.filter(p=>!owned.has(p.id)&&!p.choice&&p.id!=='PL29'&&p.id!=='PL21B'&&playLegalLoose(p));
 if(pool.length<2){S.weeklyOffer=null;return;}
 const offers=[];const bag=[...pool];
 while(offers.length<2&&bag.length){const i=Math.floor(R(bag.length));offers.push(bag.splice(i,1)[0]);}
 S.weeklyOffer=offers;
}
function playLegalLoose(a){ // legal in current or a later phase (so you can bank forward-looking cards)
 if(a.ph)return a.ph.some(p=>p>=phase(S));
 return true;
}
function showWeeklyCard(){
 if(!S.weeklyOffer){if(S.pendingLevel){showLevelUp();return;}if(S.pendingRetreat){S.pendingRetreat=false;showRetreat();return;}maybeChoice();return;}
 const offers=S.weeklyOffer;S.weeklyOffer=null;
 const root=$('overlayRoot');
 root.innerHTML=`<div class="overlay"><div class="reveal cdetail"><h3>New Card This Week</h3>
 <div class="detail" style="margin-bottom:8px">Every week the campaign learns a new move. Take one into your deck — or pass and stay lean.</div>
 <div class="hand" id="wkGrid"></div>
 <button class="btn ghost sm" id="wkSkip" style="margin-top:10px">Pass (stay lean)</button></div></div>`;
 const grid=$('wkGrid');
 offers.forEach(a=>{const b=mkMiniCard(a,false);b.disabled=false;
  b.onclick=()=>{S.deck.push(a.id);log('DECK — '+a.n+' learned this week.','rep');root.innerHTML='';afterWeeklyCard();};
  grid.appendChild(b);});
 $('wkSkip').onclick=()=>{root.innerHTML='';afterWeeklyCard();};
}
function afterWeeklyCard(){renderAll();if(S.pendingLevel){showLevelUp();return;}if(S.pendingRetreat){S.pendingRetreat=false;showRetreat();return;}maybeChoice();}

 S.xp+=n;
 while(S.xp>=S.xpNext){S.xp-=S.xpNext;S.level++;S.pendingLevel++;S.xpNext=4+S.level*2;

}

function allPlays(){return S.stage==='session'?SESSION_PLAYS:PLAYS;}
function playLegal(a){
 if(S.stage==='session'){}
 else if(S.stage==='general'){if(!GEN_SET.includes(a.id))return false;}
 else if(a.ph&&!a.ph.includes(phase(S)))return false;
 return (!a.show||a.show())&&(!a.req||a.req());}
function fixedSlots(){
 if(S.stage==='session'){
  const pipe=SESSION_PLAYS.find(a=>a.pipeline&&playLegal(a))||SESSION_PLAYS.find(a=>a.id==='SS01'&&playLegal(a));
  return [pipe,SESSION_PLAYS.find(a=>a.id==='SS08')].filter(Boolean);}
 const f=[PLAYS.find(a=>a.id==='PL01')];
 if(S.stage==='primary'&&phase(S)===1&&!S.ballot){f.push(PLAYS.find(a=>a.id==='PL04'));f.push(PLAYS.find(a=>a.id==='PL05'));}
 return f.filter(Boolean);}
function deckSource(){ // the full legal pool this stage draws from
 const fixedIds=fixedSlots().map(a=>a.id);
 if(S.stage==='session') return SESSION_PLAYS.filter(a=>playLegal(a)&&!fixedIds.includes(a.id)&&!a.pipeline&&!a.choice).map(a=>a.id);
 let d=(S.deck||[]).map(id=>PLAYS.find(p=>p.id===id)).filter(a=>a&&playLegal(a)&&!fixedIds.includes(a.id)).map(a=>a.id);
 // if the built deck is thin for this phase, fold in the wider legal pool so the pile is always healthy
 if(d.length<8){const extra=PLAYS.filter(a=>playLegal(a)&&!fixedIds.includes(a.id)&&!a.choice&&!d.includes(a.id)).map(a=>a.id);d=d.concat(extra);}
 return d;}
function refillPile(){ // shuffle the legal source (minus what's in hand) into a fresh draw pile
 const inHand=new Set(S.hand||[]);
 const pile=deckSource().filter(id=>!inHand.has(id));
 for(let i=pile.length-1;i>0;i--){const j=Math.floor(R(i+1));[pile[i],pile[j]]=[pile[j],pile[i]];}
 S.pile=pile;}
function drawOne(){ // ALWAYS returns a card unless the entire legal pool is smaller than the hand
 if(!S.pile||!S.pile.length)refillPile();
 // avoid handing back a dup already in hand; if pile exhausted of non-dups, allow a reshuffle once
 let id=null,guard=0;
 while(S.pile.length&&guard++<50){const c=S.pile.pop();if(!(S.hand||[]).includes(c)){id=c;break;}}
 if(id===null){refillPile();while(S.pile.length){const c=S.pile.pop();if(!(S.hand||[]).includes(c)){id=c;break;}}}
 if(id===null)return null; // only if legal pool <= hand size (extremely rare)
 S.hand=S.hand||[];S.hand.push(id);S.lastDrawn=id;return id;}
function dealStartingHand(){S.hand=[];S.pile=null;for(let i=0;i<4;i++)drawOne();S.lastDrawn=null;}
function weeklyDraw(){const n=1+(warm(S,'AL11')?1:0)+(S.handBonus||0);const drawn=[];for(let i=0;i<n;i++){const id=drawOne();if(id)drawn.push(id);}return drawn;}
function drawHand(){if(!S.hand||!S.hand.length)dealStartingHand();}
function redrawHand(){if(S.redrawUsed||S.over)return;
 // discard the most recently drawn card if present, else a random hand card, then draw a fresh one
 let discard=S.lastDrawn&&(S.hand||[]).includes(S.lastDrawn)?S.lastDrawn:(S.hand&&S.hand.length?S.hand[S.hand.length-1]:null);
 if(!discard){log('Nothing new to swap this week.');return;}
 S.redrawUsed=true;
 const ix=(S.hand||[]).lastIndexOf(discard);if(ix>=0)S.hand.splice(ix,1);
 const drew=drawOne();renderAll();
 log(drew?'You think better of that idea and reach for another card.':'You set the card aside; the pile is thin this week.');}

function playCard(a,opts){opts=opts||{};
 if(S.over)return;
 if(a.pipeline&&S.sessionFlags.pipelineUsed){showStamp(a.n,{tier:2,roll:0,p:0,band:0},'The building moves at the building\u2019s pace. One motion on this bill per week — the rest is casework, capital, and waiting.','SAFE');return;}
 if(a.pipeline)S.sessionFlags.pipelineUsed=true;
 if(a.choice){funeralChoice();return;}
 const doRun=(g)=>{
  if(S.stage==='session'&&!S.bill)S.bill={stage:-1,heat:0};
  const before=snap();
  a.cost._field=a.field;pay(a.cost);
  let basep=effOdds(a);
  if(opts.bargain)basep+=.15;basep=clamp(basep,0.02,0.95);
  let o=resolve(basep,a.risk);
  if(S.rainWeek&&a.field&&a.id!=='PL02'&&o.tier<3)o={...o,tier:Math.min(2,o.tier+1)};
  if(S.fairWeek&&a.field&&o.tier===1)o={...o,tier:0};
  if(o.tier===3&&S.parlSave&&!S.parlUsed&&(a.id==='PL04'||a.id==='PL24')){o={...o,tier:2};S.parlUsed=true;log('The Parliamentarian\u2019s save: DISASTER read down to SETBACK on procedure.');}
  if(o.tier===3){S.disasterLog.push(S.week);if(a.risk==='VOL')S.disSurvived=(S.disSurvived||0)+1;}
  const detail=a.run(o,g);
  if(S.hand){const ix=S.hand.indexOf(a.id);if(ix>=0)S.hand.splice(ix,1);}
  if(opts.bargain){const bg=pick(BARGAINS);bg.fx();log('THE BARGAIN COMES DUE — '+bg.t,'shadow');}
  // streak: consecutive non-disaster, non-setback results build a combo
  if(o.tier<=1){S.streak=(S.streak||0)+1;}else{if((S.streak||0)>=3)floatText('streak broken',(o.tier===3?'bad':'bad'));S.streak=0;}
  if(a.risk!=='CHOICE'){const xp=xpForTier(o.tier);gainXP(xp);if(xp>0)floatText('+'+xp+' xp','xp');}
  updateTier();shadowCheck();repCheck();checkMilestones();renderAll();
  floatDiff(before);
  if(o.tier===0)floatText('BREAKTHROUGH!','big');
  if((S.streak||0)===3)toast('On a roll! \u2605\u2605\u2605','Three clean results running. The county can feel your momentum.');
  if((S.streak||0)>3&&(S.streak%3===0))floatText(S.streak+' in a row!','big');
  if(a.risk!=='CHOICE')showStamp(a.n,o,detail,a.risk);
  log(`${a.n} — ${a.risk==='SAFE'&&o.tier===2?'SETBACK':STAMPS[o.tier]}. ${detail}`,o.tier>=2?'dire':'');
 };
 if(a.field){pickGround(g=>!g.gated,g=>doRun(g));}
 else doRun(null);
}

   S.rivals.forEach(r=>{if(r.alive)r.strength+=2+S.week*.3;});

function startGeneral(text){
 S.stage='general';S.weeksTotal=S.week+6;S.over=false;S.tier=Math.max(1,S.tier);

 S.genOpp={n:wrong?'the district itself':pick(['Frank Ybarra','Coach D.W. Sikes','Dr. Lena Holt']),strength:wrong?95+R(15):55+R(18)};
 S.ap=S.apMax;S.momentum=Math.max(1,S.momentum-2);
 // DYNAMIC SHIFT: the electorate widens. Low-propensity grounds wake up; the base cools; the middle matters.
 grounds(S).forEach(g=>{g.pool=Math.min(g.pool0,g.pool+Math.round(g.pool0*.5));g.gotv*=.4;
  if(g.prop<.5)g.prop=Math.min(.85,g.prop+.15); // general voters turn out who skipped the primary
  if(g.aff.includes('T')&&g.rapport>50)g.rapport-=8;}); // pure-base intensity doesn't travel
 S.generalShift=true;
 // the primary's winner inherits a party apparatus
 S.endorsePts+=2;S.money+=1200;S.volPool+=3;
 log('THE PARTY FALLS IN LINE — winning the primary hands you the machine: +money, +volunteers, +endorsements. But the general electorate is a different animal, and your base intensity no longer carries the day.','week');

 const text=`GENERAL ELECTION NIGHT. A bigger crowd, a colder math. The wave: <b>${wave2>0?'+':''}${wave2.toFixed(1)}</b>. Your share: <b>${share.toFixed(1)}%</b> against ${S.genOpp.n}.`;

 S.over=true;

 if(hasRep(S,'R08'))pv+=6; if(hasRep(S,'R09'))pv+=grounds(S).filter(g=>g.aff.includes('T')).length*1.5;
 let rv=S.rivals.filter(r=>r.alive).reduce((s,r)=>s+r.strength+(r.endorse||0)*2,0);
 pv=Math.max(2,pv+S.wave); rv=Math.max(6,rv);

/* ---------- chronicle ---------- */
function epithet(kind,share){
 const p=(S.name?S.name+', ':'')+PERSONAS.find(x=>x.id===S.persona).n.replace('The ','the ');
 const d={safe:'a safe seat',competitive:'a competitive district',wrong:'a wrong-party district',incumbent:'an incumbent\u2019s district'}[S.district.alignKey||S.district.align];
 let core;
 if(kind==='sessionWin')core=(S.incumbentRun?'defended the seat, ':'won the seat, ')+(S.bill&&S.bill.stage>=8?'passed their bill into law, and held the district':'survived the session, and held the district');
 else if(kind==='win')core=S.incumbentRun?`defended the seat as the incumbent on ${S.issue}`:`won the seat outright on ${S.issue}`;
 else if(kind==='ballotFail')core=`never made the ballot — ${S.signatures} signatures and an empty coffee can`;
 else if(kind==='loseGeneral')core=`won the primary on ${S.issue}, then hit the general\u2019s wall at ${share.toFixed(1)}%`;
 else if(S.stage==='session')core=`won the seat, ${S.bill&&S.bill.stage>=8?'passed a bill into law,':'fought a first session,'} and was primaried out at reelection`;
 else core=`ran on ${S.issue} and fell at ${share.toFixed(1)}%`;
 const marks=[];
 if(hasRep(S,'R11'))marks.push('the county called them snakebit');
 if(hasRep(S,'R09'))marks.push('the movement\u2019s choice to the end');
 if(hasRep(S,'R08'))marks.push('the establishment\u2019s pick');
 if(S.shFired.F2||S.shFired.T2)marks.push('undone partly by their own shadow');
 if(S.obls.length>=3)marks.push('carrying '+S.obls.length+' obligations like stones');
 if(hasRep(S,'R01'))marks.push('nobody outworked them');
 return `${p} ${core} in ${d}${marks.length?' — '+marks.join('; '):''}.`;
}

// celebration on wins

/* ---------- incumbency: the wheel turns ---------- */
function startIncumbentRun(){
 const old=S;
 S=newState();
 // the machine survives: persona, region, issue, and a discounted share of everything built
 S.persona=old.persona;const p=PERSONAS.find(x=>x.id===S.persona);if(p)p.fx(S);
 const reg=REGIONS.find(r=>r.n===old.region);if(reg){S.region=reg.n;reg.fx(S);}
 S.issue=old.issue;S.issueAff=old.issueAff;
 (S.issueAff||[]).forEach(id=>{const g=ground(S,id);if(g)g.rapport=Math.max(g.rapport,8);});
 // an incumbent is KNOWN — sitting members carry real name recognition, a donor base, and a machine
 S.contacts=Math.max(400,Math.round((old.contacts||0)*.6));
 S.nameID=Math.max(45,Math.round((old.nameID||0)*.8)+30);
 S.money=Math.max(4000,2500+Math.round(Math.max(0,old.money)*.4));
 S.endorsePts=Math.max(4,(old.endorsePts||0));
 S.ballot=true; // incumbents don't petition
 S.volPool=Math.max(4,Math.round((old.volPool||0)*.6));
 S.termNumber=(old.termNumber||1)+1;
 // reputations that are truly yours ride along; obligations of ink and blood do too
 S.reps=old.reps.filter(r=>['R01','R02','R05','R06','R12'].includes(r));
 S.obls=old.obls.filter(o=>['OB3','OB6','OB9'].includes(o));
 applyLegacy(S);
 // incumbency's price: a record, a target on your back, and challengers who studied you
 S.deck=[...(old.deck||[])];S.upgrades={...(old.upgrades||{})};S.incumbentRun=true;S.tier=1;
 if(old.favor>62){S.hitPieces=1;log('Your record rides with you: that vote for the Speaker is already in a challenger\u2019s mailer.','dire');}
 S.district={align:'safe',alignKey:'incumbent-self'};
 const tn=S.termNumber||2;S.rivals=mkRivals(1+Math.min(3,tn));S.rivals.forEach(r=>{r.strength+=6+tn*2;r.grow+=.2+tn*.05;});
 $('terminal').classList.add('hidden');$('game').classList.remove('hidden');
 log('THE WHEEL TURNS — filing opens again, and this time the name on the incumbent line is yours. Two challengers are already walking blocks you once walked. They are hungry the way you were hungry.','week');
 log('You skip the petition table — incumbents file clean. You begin KNOWN: name recognition, a donor list, a record. That record is also a target — challengers have studied it.');
 setEpigraph();$('endWeekBtn').onclick=()=>{if(S.ap>0&&!S.over){const root=$('overlayRoot');
  root.innerHTML=`<div class="overlay"><div class="reveal"><h3>${S.ap} action${S.ap===1?'':'s'} still on the table</h3><div class="detail">Weeks are the one thing the campaign never refunds.</div><div class="pickrow"><button class="btn sm" id="ewGo">End it anyway</button><button class="btn ghost sm" id="ewStay">Back to work</button></div></div></div>`;
  $('ewGo').onclick=()=>{root.innerHTML='';endWeek();};$('ewStay').onclick=()=>{root.innerHTML='';};}else endWeek();};
 buildDeck();S.deck=[...new Set([...(old.deck||[]),...S.deck])];drawOpportunity();dealStartingHand();renderAll();window.scrollTo({top:0,behavior:'smooth'});}

function showMap(){
 const root=$('overlayRoot');
 root.innerHTML=`<div class="overlay" data-dismiss="1"><div class="reveal" style="max-width:600px"><h3>How Candidate Zero Works</h3>
 <div class="digest">
 <p><b>The shape of it.</b> You start as a nobody with no money and run for the Texas Legislature. Win the primary, then (in a contested district) the general, then take office and survive a legislative session — then defend the seat and do it again. Losing is expected; each run makes the next one wiser.</p>
 <p><b>A week at a time.</b> Each week you get 2 actions. Play cards from your hand, then End Week. Rivals move, an event hits, the clock runs. The <b>Primary</b> is 12 weeks in three phases: Petition (1–4), the Long Middle (5–8), Get Out The Vote (9–12). Filing deadline is week 5 — signatures or the fee.</p>
 <p><b>Your deck grows.</b> You start with a small hand and <b>draw one new card each week</b>. Unplayed cards stay. Win a straw poll or hit a phase-turn Retreat to add, sharpen, or cut cards. A lean deck draws truer.</p>
 <p><b>Six attributes</b> (CLO Clout · CON Control · CRA Craftiness · INK Institutional Knowledge · DIP Diplomacy · CHA Charm) set what you\u2019re good at — every card leans on one or two, so a high-CHA candidate is better at doors and media, a high-INK one better in session. Your character, region, and issue all shape them. See the <b>You</b> tab.</p>
 <p><b>Six Faces</b> (Parliamentarian↔Obstructionist and five more) track your <i>character</i>, not your skill. Push a Face into shadow and it curdles — power and corruption arrive together.</p>
 <p><b>Grounds</b> are your turf: unknocked doors, turnout habit, and your rapport. Field cards work them; GOTV banks rapport into votes for election night.</p>
 <p><b>Risk:</b> <b>SAFE</b> cards can never disaster (when in doubt, block walk). <b>STD</b> is honest odds. <b>VOL</b> swings big both ways. Any risky card can take a <b>Devil\u2019s Bargain</b>: +15% odds, but a complication lands no matter what.</p>
